<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservar hora</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#08090d;color:#e8e6e0;min-height:100vh}
.header{padding:20px 24px;border-bottom:0.5px solid #222;display:flex;align-items:center;gap:12px}
.header-logo{font-size:22px}
.header-info h1{font-size:16px;font-weight:600;color:#fff}
.header-info p{font-size:12px;color:#555;margin-top:2px}
.container{max-width:640px;margin:0 auto;padding:24px 16px}
.steps{display:flex;gap:0;margin-bottom:28px;border-bottom:0.5px solid #222}
.step-tab{flex:1;padding:10px 8px;text-align:center;font-size:12px;color:#444;border-bottom:2px solid transparent;transition:all 0.2s}
.step-tab.active{color:#7c6af7;border-bottom-color:#7c6af7}
.step-tab.done{color:#4caf87}
.step-content{display:none}.step-content.active{display:block}
.card{background:#0f1018;border:0.5px solid #222;border-radius:12px;padding:20px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:#e8e6e0;margin-bottom:14px}
.servicio-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.servicio-card{border:0.5px solid #2a2a2a;border-radius:10px;padding:14px;cursor:pointer;transition:all 0.15s}
.servicio-card:hover{border-color:#555;background:#1a1a1a}
.servicio-card.selected{border-color:#7c6af7;background:#1a1a18}
.servicio-nombre{font-size:13px;font-weight:600;color:#e8e6e0;margin-bottom:4px}
.servicio-precio{font-size:18px;font-weight:700;color:#7c6af7}
.servicio-dur{font-size:11px;color:#555;margin-top:4px}
.profesional-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.profesional-card{border:0.5px solid #2a2a2a;border-radius:10px;padding:14px;cursor:pointer;transition:all 0.15s;text-align:center}
.profesional-card:hover{border-color:#555;background:#1a1a1a}
.profesional-card.selected{border-color:#7c6af7;background:#1a1a18}
.profesional-avatar{width:44px;height:44px;border-radius:50%;background:#1a1a18;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 8px}
.profesional-nombre{font-size:12px;font-weight:600;color:#e8e6e0}
.calendario{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-header{text-align:center;font-size:10px;color:#444;padding:4px 0;font-weight:500;text-transform:uppercase}
.cal-day{text-align:center;padding:8px 4px;border-radius:8px;cursor:pointer;font-size:13px;transition:all 0.15s;border:0.5px solid transparent}
.cal-day.empty{cursor:default}
.cal-day.past{color:#333;cursor:not-allowed}
.cal-day.available:hover{border-color:#555;background:#1a1a1a}
.cal-day.selected{background:linear-gradient(135deg,#7c6af7,#5b8def);color:#fff;font-weight:600}
.cal-day.today{border-color:#555}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{background:none;border:0.5px solid #2a2a2a;border-radius:6px;color:#888;padding:5px 10px;cursor:pointer;font-size:14px}
.cal-nav-btn:hover{color:#e8e6e0;border-color:#555}
.cal-mes{font-size:13px;font-weight:600;color:#e8e6e0}
.horarios{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.horario-btn{padding:9px;border-radius:8px;border:0.5px solid #2a2a2a;background:transparent;color:#888;font-size:12px;cursor:pointer;transition:all 0.15s}
.horario-btn:hover:not(:disabled){border-color:#555;color:#e8e6e0;background:#1a1a1a}
.horario-btn.selected{background:#d4a853;color:#0a0a0a;border-color:#7c6af7;font-weight:600}
.horario-btn:disabled{opacity:0.3;cursor:not-allowed}
.form-group{margin-bottom:12px}
label{font-size:11px;color:#555;display:block;margin-bottom:4px}
input,textarea{background:#161616;border:0.5px solid #252525;border-radius:8px;color:#e8e6e0;padding:10px 12px;font-size:13px;width:100%;transition:border-color 0.15s;font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:#7c6af7}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:linear-gradient(135deg,#7c6af7,#5b8def);color:#fff}
.btn-primary:hover:not(:disabled){background:linear-gradient(135deg,#6b59e6,#4a7cde)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:#777;border:0.5px solid #2a2a2a;margin-top:8px}
.btn-ghost:hover{color:#e8e6e0}
.btn-wa{display:block;text-decoration:none;text-align:center;background:#002210;color:#25d366;border:0.5px solid #25d366;margin-top:12px}
.btn-wa:hover{background:#003318}
.resumen{background:#13142a;border:0.5px solid #7c6af7;border-radius:10px;padding:16px;margin-bottom:16px}
.resumen-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid #2a2a2a;font-size:13px}
.resumen-row:last-child{border-bottom:none}
.resumen-label{color:#666}
.resumen-val{color:#e8e6e0;font-weight:500}
.success-screen{text-align:center;padding:40px 20px}
.success-icon{font-size:56px;margin-bottom:16px}
.success-title{font-size:20px;font-weight:600;color:#fff;margin-bottom:8px}
.success-sub{font-size:13px;color:#555;line-height:1.6}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px}
.alert-err{background:#1f0000;border:0.5px solid #e05050;color:#e05050}
.alert-warn{background:#1f1600;border:0.5px solid #d4a853;color:#7c6af7}
.no-horarios{text-align:center;padding:20px;color:#444;font-size:13px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #333;border-top-color:#7c6af7;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.servicio-grid{grid-template-columns:1fr}.profesional-grid{grid-template-columns:1fr 1fr}.horarios{grid-template-columns:repeat(3,1fr)}.fr{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo" style="background:linear-gradient(135deg,#7c6af7,#5b8def);-webkit-background-clip:text;-webkit-text-fill-color:transparent">◈</div>
  <div class="header-info">
    <h1 id="h-nombre">Cargando...</h1>
    <p id="h-dir"></p>
  </div>
</div>

<div class="container">
  <div id="prof-preselec" style="display:none;margin-bottom:14px;padding:10px 14px;background:#13142a;border:0.5px solid #7c6af7;border-radius:8px;font-size:12px;color:#999;text-align:center"></div>
  <div class="steps">
    <div class="step-tab active" id="st-1">1. Servicio</div>
    <div class="step-tab" id="st-2">2. Profesional</div>
    <div class="step-tab" id="st-3">3. Fecha y hora</div>
    <div class="step-tab" id="st-4">4. Tus datos</div>
    <div class="step-tab" id="st-5">5. Confirmar</div>
  </div>

  <!-- PASO 1: Servicio -->
  <div class="step-content active" id="sc-1">
    <div class="card">
      <div class="card-title">¿Qué servicio necesitas?</div>
      <div class="servicio-grid" id="lista-servicios"></div>
    </div>
    <button class="btn btn-primary" id="btn-s1" onclick="irPaso(SALTAR_PROFESIONAL?3:2)" disabled>Continuar →</button>
  </div>

  <!-- PASO 2: Profesional -->
  <div class="step-content" id="sc-2">
    <div class="card">
      <div class="card-title">¿Con quién quieres atenderte?</div>
      <div class="profesional-grid" id="lista-profesionals"></div>
    </div>
    <button class="btn btn-primary" id="btn-s2" onclick="irPaso(3)" disabled>Continuar →</button>
    <button class="btn btn-ghost" onclick="irPaso(1)">← Volver</button>
  </div>

  <!-- PASO 3: Fecha y hora -->
  <div class="step-content" id="sc-3">
    <div class="card">
      <div class="card-title">¿Cuándo quieres venir?</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="cambiarMes(-1)">‹</button>
        <span class="cal-mes" id="cal-mes-label"></span>
        <button class="cal-nav-btn" onclick="cambiarMes(1)">›</button>
      </div>
      <div class="calendario" id="calendario">
        <div class="cal-header">Lu</div><div class="cal-header">Ma</div>
        <div class="cal-header">Mi</div><div class="cal-header">Ju</div>
        <div class="cal-header">Vi</div><div class="cal-header">Sá</div>
        <div class="cal-header">Do</div>
      </div>
    </div>
    <div class="card" id="card-horarios" style="display:none">
      <div class="card-title" id="horarios-titulo">Horarios disponibles</div>
      <div class="horarios" id="lista-horarios"></div>
    </div>
    <button class="btn btn-primary" id="btn-s3" onclick="irPaso(4)" disabled>Continuar →</button>
    <button class="btn btn-ghost" onclick="irPaso(SALTAR_PROFESIONAL?1:2)">← Volver</button>
  </div>

  <!-- PASO 4: Datos cliente -->
  <div class="step-content" id="sc-4">
    <div class="card">
      <div class="card-title">Tus datos de contacto</div>
      <div class="fr">
        <div class="form-group"><label>Nombre *</label><input type="text" id="cl-nombre" placeholder="Juan"></div>
        <div class="form-group"><label>Apellido</label><input type="text" id="cl-apellido" placeholder="Pérez"></div>
      </div>
      <div class="form-group"><label>WhatsApp *</label><input type="tel" id="cl-wsp" placeholder="+56 9 XXXX XXXX"></div>
      <div class="form-group"><label>Correo electrónico *</label><input type="email" id="cl-email" placeholder="tu@correo.com"></div>
      <div class="form-group"><label>Fecha de nacimiento (opcional)</label><input type="date" id="cl-cumple"></div>
      <div class="form-group"><label>Notas (opcional)</label><textarea id="cl-notas" rows="2" placeholder="Ej: corte específico, alergias..."></textarea></div>
    </div>
    <button class="btn btn-primary" onclick="irPaso(5)">Continuar →</button>
    <button class="btn btn-ghost" onclick="irPaso(3)">← Volver</button>
  </div>

  <!-- PASO 5: Confirmar -->
  <div class="step-content" id="sc-5">
    <div id="alert-confirm" style="display:none" class="alert alert-err"></div>
    <div class="resumen" id="resumen-reserva"></div>
    <button class="btn btn-primary" id="btn-confirmar" onclick="confirmarReserva()">✓ Confirmar reserva</button>
    <button class="btn btn-ghost" onclick="irPaso(4)">← Volver</button>
  </div>

  <!-- ÉXITO -->
  <div class="step-content" id="sc-exito">
    <div class="success-screen">
      <div class="success-icon">✅</div>
      <div class="success-title">¡Reserva confirmada!</div>
      <div class="success-sub" id="success-msg"></div>
      <button class="btn btn-wa" id="btn-wa-confirmar" style="max-width:260px;margin-left:auto;margin-right:auto" onclick="confirmarPorWhatsApp()">📱 Confirmar por WhatsApp a la barbería</button>
      <button class="btn btn-ghost" style="margin-top:12px;max-width:260px;margin-left:auto;margin-right:auto" onclick="nuevaReserva()">Hacer otra reserva</button>
    </div>
  </div>
</div>

<script>
// ⚠️ REEMPLAZA ESTOS VALORES
const SUPABASE_URL = 'https://dqoqykngmtxtvbokxbzp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxb3F5a25nbXR4dHZib2t4YnpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTc1NDEsImV4cCI6MjA5Nzk5MzU0MX0.aLjslOdIod_wsdiHN3O7SRlbsM4hOj3nNQTlNTc_rY4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Obtener slug de la URL: barbercrm.app/reservar.html?barberia=essential-studio
const params = new URLSearchParams(window.location.search);
const BARBERIA_ID = params.get('barberia') || params.get('id');

let B = { barberia:null, servicios:[], profesionals:[], reservasOcupadas:[], horario:{}, bloqueos:[] };
let SEL = { servicio:null, profesional:null, fecha:null, hora:null };
let calMes = new Date();
let ULTIMO_NOMBRE = '';
let SALTAR_PROFESIONAL = false;

const HORARIOS_BASE = ['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'];

function timeToMin(t){ if(!t)return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
function minToTime(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }

// Slots de 30 min para un día de la semana según horario_negocio. Si el
// negocio no configuró ese día (tabla vacía o falta esa fila puntual), se
// usa HORARIOS_BASE como antes — para no dejar sin horarios a negocios que
// todavía no configuraron su horario.
function slotsParaDia(diaSemana){
  const cfg = B.horario[diaSemana];
  if(!cfg) return HORARIOS_BASE.slice();
  if(cfg.cerrado) return [];
  const ini=timeToMin(cfg.hora_apertura), fin=timeToMin(cfg.hora_cierre);
  if(ini==null||fin==null) return [];
  const out=[];
  for(let m=ini; m<fin; m+=30) out.push(minToTime(m));
  return out;
}

// ¿Este bloqueo cubre el slot "hora" (HH:MM) de esa fecha/día de semana?
function bloqueoCubreSlot(b, hora, fecha, diaSemana){
  const hMin=timeToMin(hora);
  if(b.tipo==='dia_completo') return b.fecha===fecha;
  if(b.tipo==='puntual'){
    if(b.fecha!==fecha) return false;
    const ini=timeToMin(b.hora_inicio), fin=timeToMin(b.hora_fin);
    return ini!=null && fin!=null && hMin>=ini && hMin<fin;
  }
  if(b.tipo==='recurrente'){
    if(b.dia_semana!==diaSemana) return false;
    const ini=timeToMin(b.hora_inicio), fin=timeToMin(b.hora_fin);
    return ini!=null && fin!=null && hMin>=ini && hMin<fin;
  }
  return false;
}

// Arma/compara fechas solo con componentes locales (año/mes/día) — nunca vía
// toISOString() ni new Date("YYYY-MM-DD"), que se interpretan como UTC y
// pueden correrse un día según la zona horaria del visitante.
function fmtDateLocal(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function abrirWA(wsp,msg){ const n=(wsp||'').replace(/\D/g,''); window.open('https://wa.me/'+n+'?text='+encodeURIComponent(msg),'_blank'); }

async function init(){
  if(!BARBERIA_ID){ document.body.innerHTML='<div style="text-align:center;padding:60px;color:#555">URL inválida. Falta el ID de la negocio.</div>'; return; }
  const {data:barb} = await sb.from('barberias').select('*').eq('id',BARBERIA_ID).single();
  if(!barb){ document.body.innerHTML='<div style="text-align:center;padding:60px;color:#555">Negocio no encontrada.</div>'; return; }
  B.barberia = barb;
  document.getElementById('h-nombre').textContent = barb.nombre;
  document.getElementById('h-dir').textContent = barb.direccion || '';
  document.title = 'Reservar — ' + barb.nombre;
  const [{data:sv},{data:ba},{data:hn},{data:blq}] = await Promise.all([
    sb.from('servicios').select('*').eq('barberia_id',BARBERIA_ID).eq('activo',true).order('precio'),
    sb.from('barberos').select('*').eq('barberia_id',BARBERIA_ID).order('nombre'),
    sb.from('horario_negocio').select('*').eq('barberia_id',BARBERIA_ID),
    sb.from('bloqueos_profesional').select('*').eq('barberia_id',BARBERIA_ID).eq('activo',true)
  ]);
  B.servicios = sv||[]; B.profesionals = ba||[];
  B.horario = {}; (hn||[]).forEach(h=>{ B.horario[h.dia_semana]=h; });
  B.bloqueos = blq||[];
  renderServicios(); renderProfesionals(); renderCalendario();
  const profParam = params.get('profesional');
  const profPreseleccionado = profParam && B.profesionals.find(b=>b.id===profParam);
  if(profPreseleccionado){
    selProfesional(profParam);
    SALTAR_PROFESIONAL = true;
    document.getElementById('st-2').style.display = 'none';
    const banner = document.getElementById('prof-preselec');
    banner.innerHTML = `Reservando con: <strong style="color:#e8e6e0">${profPreseleccionado.nombre}</strong>`;
    banner.style.display = '';
  }
}

function renderServicios(){
  document.getElementById('lista-servicios').innerHTML = B.servicios.map(s=>`
    <div class="servicio-card" onclick="selServicio('${s.id}')" id="sv-${s.id}">
      <div class="servicio-nombre">${s.nombre}</div>
      <div class="servicio-precio">$${s.precio.toLocaleString('es-CL')}</div>
      <div class="servicio-dur">${s.duracion_min} min</div>
    </div>`).join('') || '<p style="color:#555;font-size:13px">No hay servicios disponibles.</p>';
}

function selServicio(id){
  SEL.servicio = B.servicios.find(s=>s.id===id);
  document.querySelectorAll('.servicio-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('sv-'+id).classList.add('selected');
  document.getElementById('btn-s1').disabled = false;
}

function renderProfesionals(){
  const todos = {id:'cualquiera',nombre:'Cualquier profesional',emoji:'✂'};
  const items = [todos,...B.profesionals];
  document.getElementById('lista-profesionals').innerHTML = items.map(b=>`
    <div class="profesional-card" onclick="selProfesional('${b.id}')" id="ba-${b.id}">
      <div class="profesional-avatar">${b.emoji||'✂'}</div>
      <div class="profesional-nombre">${b.nombre}</div>
    </div>`).join('');
}

function selProfesional(id){
  SEL.profesional = id==='cualquiera' ? null : B.profesionals.find(b=>b.id===id);
  document.querySelectorAll('.profesional-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('ba-'+id).classList.add('selected');
  document.getElementById('btn-s2').disabled = false;
}

function renderCalendario(){
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  document.getElementById('cal-mes-label').textContent = meses[calMes.getMonth()]+' '+calMes.getFullYear();
  const primerDia = new Date(calMes.getFullYear(),calMes.getMonth(),1);
  const ultimoDia = new Date(calMes.getFullYear(),calMes.getMonth()+1,0);
  let lunes = primerDia.getDay()-1; if(lunes===-1)lunes=6;
  const cal = document.getElementById('calendario');
  const headers = cal.querySelectorAll('.cal-header');
  cal.innerHTML='';
  headers.forEach(h=>cal.appendChild(h.cloneNode(true)));
  for(let i=0;i<lunes;i++) cal.innerHTML+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=ultimoDia.getDate();d++){
    const fecha = new Date(calMes.getFullYear(),calMes.getMonth(),d);
    const fechaStr = fmtDateLocal(fecha);
    const past = fecha < hoy;
    const sel = SEL.fecha===fechaStr;
    const hoyClass = fechaStr===fmtDateLocal(hoy)?'today':'';
    cal.innerHTML+=`<div class="cal-day ${past?'past':'available'} ${sel?'selected':''} ${hoyClass}" ${!past?`onclick="selFecha('${fechaStr}')"`:''}">${d}</div>`;
  }
}

function cambiarMes(dir){
  calMes.setMonth(calMes.getMonth()+dir);
  renderCalendario();
}

async function selFecha(fecha){
  SEL.fecha = fecha; SEL.hora = null;
  document.getElementById('btn-s3').disabled = true;
  renderCalendario();
  const barb = document.getElementById('card-horarios');
  barb.style.display = '';
  const d = new Date(fecha+'T12:00:00');
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('horarios-titulo').textContent = `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]}`;
  // Cargar reservas existentes para ese día y profesional. Se usa la vista
  // pública reservas_disponibilidad (no la tabla real) para no exponer datos
  // del cliente a visitantes anónimos — solo expone hora/profesional/estado.
  let query = sb.from('reservas_disponibilidad').select('hora,barbero_nombre').eq('barberia_id',BARBERIA_ID).eq('fecha',fecha).eq('procesado',false);
  const {data:ocupadas} = await query;
  B.reservasOcupadas = ocupadas||[];
  renderHorarios();
}

function renderHorarios(){
  const d = new Date(SEL.fecha+'T12:00:00');
  const diaSemana = d.getDay();
  const slots = slotsParaDia(diaSemana);
  document.getElementById('lista-horarios').innerHTML = slots.map(h=>{
    const ocupadoPorReserva = B.reservasOcupadas.some(r=>{
      if(SEL.profesional && r.barbero_nombre!==SEL.profesional.nombre) return false;
      return r.hora && r.hora.startsWith(h);
    });
    // Mismo criterio que reservasOcupadas: sin profesional elegido ("cualquiera
    // disponible"), un bloqueo de cualquier profesional oculta el horario —
    // limitación ya existente para citas ocupadas, no nueva de esta feature.
    const bloqueado = SEL.profesional
      ? B.bloqueos.some(b=>b.profesional_id===SEL.profesional.id && bloqueoCubreSlot(b,h,SEL.fecha,diaSemana))
      : B.bloqueos.some(b=>bloqueoCubreSlot(b,h,SEL.fecha,diaSemana));
    const ocupado = ocupadoPorReserva || bloqueado;
    const sel = h===SEL.hora;
    return`<button class="horario-btn ${sel?'selected':''}" ${ocupado?'disabled':''} onclick="selHora('${h}')">${h}</button>`;
  }).join('') || '<div class="no-horarios">No hay horarios disponibles.</div>';
}

function selHora(h){
  SEL.hora = h;
  document.querySelectorAll('.horario-btn').forEach(b=>b.classList.remove('selected'));
  event.target.classList.add('selected');
  document.getElementById('btn-s3').disabled = false;
}

function irPaso(n){
  // Validar paso 4
  if(n===5){
    const nombre=document.getElementById('cl-nombre').value.trim();
    const wsp=document.getElementById('cl-wsp').value.trim();
    const email=document.getElementById('cl-email').value.trim();
    if(!nombre||!wsp||!email){alert('Nombre, WhatsApp y correo son obligatorios.');return;}
    if(!email.includes('@')){alert('Ingresa un correo válido.');return;}
    renderResumen();
  }
  document.querySelectorAll('.step-content').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.step-tab').forEach((t,i)=>{
    t.classList.remove('active');
    if(i<n-1)t.classList.add('done');
    else t.classList.remove('done');
  });
  const sc = document.getElementById('sc-'+n);
  if(sc){sc.classList.add('active'); document.getElementById('st-'+n).classList.add('active');}
  window.scrollTo(0,0);
}

function renderResumen(){
  const nombre=document.getElementById('cl-nombre').value.trim()+' '+document.getElementById('cl-apellido').value.trim();
  const d=new Date(SEL.fecha+'T12:00:00');
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('resumen-reserva').innerHTML=`
    <div class="resumen-row"><span class="resumen-label">Servicio</span><span class="resumen-val">${SEL.servicio?.nombre}</span></div>
    <div class="resumen-row"><span class="resumen-label">Profesional</span><span class="resumen-val">${SEL.profesional?.nombre||'Cualquiera disponible'}</span></div>
    <div class="resumen-row"><span class="resumen-label">Fecha</span><span class="resumen-val">${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]}</span></div>
    <div class="resumen-row"><span class="resumen-label">Hora</span><span class="resumen-val">${SEL.hora} hrs</span></div>
    <div class="resumen-row"><span class="resumen-label">Valor</span><span class="resumen-val" style="color:#7c6af7">$${SEL.servicio?.precio.toLocaleString('es-CL')}</span></div>
    <div class="resumen-row"><span class="resumen-label">Cliente</span><span class="resumen-val">${nombre.trim()}</span></div>`;
}

async function confirmarReserva(){
  const btn=document.getElementById('btn-confirmar');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Confirmando...';
  const nombre=document.getElementById('cl-nombre').value.trim();
  const apellido=document.getElementById('cl-apellido').value.trim();
  const wsp=document.getElementById('cl-wsp').value.trim();
  const email=document.getElementById('cl-email').value.trim();
  const cumpleanos=document.getElementById('cl-cumple').value||null;
  const notas=document.getElementById('cl-notas').value.trim();
  try{
    const {data,error}=await sb.from('reservas').insert({
      barberia_id:BARBERIA_ID,
      nombre_cliente:nombre+' '+apellido,
      whatsapp_cliente:wsp,
      email_cliente:email,
      cumpleanos_cliente:cumpleanos,
      fecha:SEL.fecha,
      hora:SEL.hora,
      servicio:SEL.servicio?.nombre,
      barbero_nombre:SEL.profesional?.nombre||'Por asignar',
      estado:'Confirmada',
      procesado:false,
      notas:notas,
      fuente:'Web propia'
    }).select().single();
    if(error)throw error;
    ULTIMO_NOMBRE=(nombre+' '+apellido).trim();
    // Enviar correos via edge function (si está configurada)
    await enviarCorreos({nombre,apellido,email,wsp,reserva:data});
    // Email de confirmación automático (Vercel + Resend). No bloquea la UI ni
    // muestra error al cliente si falla — el servidor decide con qué datos reales.
    fetch('/api/enviar-confirmacion',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reservaId:data.id})}).catch(()=>{});
    // Mostrar éxito
    document.querySelectorAll('.step-content').forEach(s=>s.classList.remove('active'));
    document.getElementById('sc-exito').classList.add('active');
    document.getElementById('success-msg').innerHTML=`Tu reserva quedó registrada.<br><br>📅 ${SEL.fecha} a las ${SEL.hora} hrs<br>✂️ ${SEL.servicio?.nombre} con ${SEL.profesional?.nombre||'profesional por asignar'}<br><br>¡Te esperamos en ${B.barberia.nombre}!`;
    document.getElementById('btn-wa-confirmar').style.display=B.barberia.whatsapp?'':'none';
  }catch(e){
    const al=document.getElementById('alert-confirm');
    al.textContent='Error al confirmar: '+e.message; al.style.display='';
    btn.disabled=false; btn.textContent='✓ Confirmar reserva';
  }
}

async function enviarCorreos({nombre,apellido,email,wsp,reserva}){
  // Llama a la Edge Function de Supabase que envía los correos
  try{
    await sb.functions.invoke('enviar-correos-reserva',{
      body:{
        tipo:'nueva_reserva',
        barberia:B.barberia,
        cliente:{nombre,apellido,email,wsp},
        reserva,
        servicio:SEL.servicio,
        profesional:SEL.profesional
      }
    });
  }catch(e){
    console.log('Correos no enviados (Edge Function no configurada):', e.message);
  }
}

function confirmarPorWhatsApp(){
  if(!B.barberia?.whatsapp)return;
  const msg=`Hola! Quiero confirmar mi reserva en ${B.barberia.nombre}:\n📅 ${SEL.fecha} a las ${SEL.hora} hrs\n✂️ ${SEL.servicio?.nombre||''}${SEL.profesional?' con '+SEL.profesional.nombre:''}\nNombre: ${ULTIMO_NOMBRE}`;
  abrirWA(B.barberia.whatsapp,msg);
}

function nuevaReserva(){
  SEL={servicio:null,profesional:null,fecha:null,hora:null};
  document.querySelectorAll('.step-content').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-1').classList.add('active');
  document.querySelectorAll('.step-tab').forEach(t=>{t.classList.remove('active','done');});
  document.getElementById('st-1').classList.add('active');
  document.querySelectorAll('.servicio-card,.profesional-card').forEach(c=>c.classList.remove('selected'));
  ['cl-nombre','cl-apellido','cl-wsp','cl-email','cl-notas'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  window.scrollTo(0,0);
}

init();
</script>
