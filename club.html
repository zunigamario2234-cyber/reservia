<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Club VIP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#08090d;color:#e8e6e0;min-height:100vh}
.header{padding:24px;text-align:center}
.header h1{font-size:15px;font-weight:600;color:#888;letter-spacing:0.3px}
.container{max-width:480px;margin:0 auto;padding:0 16px 40px}
.card{background:#0f1018;border:0.5px solid #222;border-radius:14px;padding:22px;margin-bottom:16px}
.hero{text-align:center;padding:32px 22px}
.hero-badge{font-size:52px;margin-bottom:10px}
.hero-nombre{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px}
.hero-nivel{font-size:22px;font-weight:700;margin-bottom:14px}
.hero-beneficio{display:inline-block;background:#13142a;border:0.5px solid #7c6af7;border-radius:20px;padding:8px 18px;font-size:13px;color:#c9c3ff}
.progreso-wrap{margin-top:20px}
.progreso-label{font-size:11px;color:#555;margin-bottom:6px;text-align:center}
.progreso-bar{height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden}
.progreso-fill{height:100%;background:linear-gradient(90deg,#7c6af7,#5b8def);border-radius:4px;transition:width 0.4s}
.card-title{font-size:13px;font-weight:600;color:#e8e6e0;margin-bottom:14px}
.alianza-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid #1a1a1a}
.alianza-item:last-child{border-bottom:none}
.alianza-logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#7c6af7,#5b8def);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.alianza-logo img{width:100%;height:100%;object-fit:cover}
.alianza-nombre{font-size:13px;font-weight:600;color:#e8e6e0}
.alianza-beneficio{font-size:12px;color:#7c6af7;margin-top:2px}
.alianza-desc{font-size:11px;color:#555;margin-top:2px}
.alianza-link{font-size:11px;color:#5b8def;text-decoration:none}
.hist-item{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:4px 8px;padding:10px 0;border-bottom:0.5px solid #1a1a1a;font-size:12px}
.hist-item:last-child{border-bottom:none}
.hist-nivel{font-weight:600}
.hist-fecha{color:#555;white-space:nowrap}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-silver{background:#2a2a2a;color:#ccc}
.b-gold{background:#3a2f10;color:#d4a853}
.b-blue{background:#13142a;color:#6ab0e0}
.b-green{background:#0f2a1a;color:#5cd685}
.empty{text-align:center;color:#444;font-size:12px;padding:16px 0}
.msg-full{text-align:center;padding:80px 20px;color:#555;font-size:13px;line-height:1.6}
@media(max-width:360px){
  .container{padding:0 12px 32px}
  .card{padding:16px}
  .hero{padding:24px 16px}
  .alianza-item{gap:10px}
  .alianza-logo{width:38px;height:38px}
}
</style>
</head>
<body>

<div class="header"><h1 id="h-nombre">Mi Club VIP</h1></div>
<div class="container" id="contenido">
  <div class="msg-full">Cargando tu información...</div>
</div>

<script>
const SUPABASE_URL = 'https://dqoqykngmtxtvbokxbzp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxb3F5a25nbXR4dHZib2t4YnpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTc1NDEsImV4cCI6MjA5Nzk5MzU0MX0.aLjslOdIod_wsdiHN3O7SRlbsM4hOj3nNQTlNTc_rY4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const BARBERIA_ID = params.get('id');
const CLIENTE_ID = params.get('cliente');

// Ícono y color se asignan por POSICIÓN en la escalera de niveles del
// negocio (no por nombre) — los niveles son configurables, no hay
// "Plata/Oro/Diamante" fijos.
const ICONOS_NIVEL = ['🥈','🥇','💎','⭐','🌟','👑'];
const BADGES_NIVEL = ['b-silver','b-gold','b-blue','b-green'];
const COLORES_NIVEL = ['#aaa','#d4a853','#6ab0e0','#5cd685'];
function iconoPos(i){ return i>=0?ICONOS_NIVEL[i%ICONOS_NIVEL.length]:'🎫'; }
function badgePos(i){ return i>=0?BADGES_NIVEL[i%BADGES_NIVEL.length]:'b-silver'; }
const MESES_CORTOS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function fmtFechaCorta(f){
  if(!f)return'—';
  const d=new Date(f);
  if(isNaN(d))return f;
  return d.getUTCDate()+' '+MESES_CORTOS[d.getUTCMonth()]+' '+d.getUTCFullYear();
}
function colorPos(i){ return i>=0?COLORES_NIVEL[i%COLORES_NIVEL.length]:'#666'; }

function mostrarError(msg){
  document.getElementById('contenido').innerHTML = `<div class="msg-full">${msg}</div>`;
}

async function init(){
  if(!BARBERIA_ID || !CLIENTE_ID){ mostrarError('Este link no es válido. Falta información en la URL.'); return; }

  const {data:barb} = await sb.from('barberias').select('nombre').eq('id',BARBERIA_ID).single();
  if(!barb){ mostrarError('No encontramos este negocio.'); return; }
  document.getElementById('h-nombre').textContent = barb.nombre + ' — Club VIP';
  document.title = 'Mi Club VIP — ' + barb.nombre;

  const {data:clienteRows,error:eCli} = await sb.rpc('get_club_vip_publico',{p_barberia_id:BARBERIA_ID,p_cliente_id:CLIENTE_ID});
  const cliente = clienteRows && clienteRows[0];
  if(eCli || !cliente){ mostrarError('No encontramos tu perfil de cliente VIP. Consulta con el negocio.'); return; }

  const [{data:historial},{data:alianzas},{data:niveles}] = await Promise.all([
    sb.rpc('get_club_vip_historial_publico',{p_barberia_id:BARBERIA_ID,p_cliente_id:CLIENTE_ID}),
    sb.from('alianzas').select('*').eq('barberia_id',BARBERIA_ID).eq('activo',true),
    sb.from('niveles_vip').select('*').eq('barberia_id',BARBERIA_ID).order('orden')
  ]);

  render(cliente, historial||[], alianzas||[], niveles||[]);
}

function render(cliente, historial, alianzas, niveles){
  const nivel = cliente.nivel || 'Sin nivel';
  const totalV = cliente.total_visitas||0;
  const idx = niveles.findIndex(nv=>nv.nombre===nivel);
  const nivelActual = idx>=0?niveles[idx]:null;
  const proximoNivel = niveles.find(nv=>nv.visitas_minimas>totalV);
  const beneficio = nivelActual?.beneficio || 'Sigue viniendo para desbloquear beneficios';

  let progresoHtml = '';
  if(proximoNivel){
    const previo = nivelActual?.visitas_minimas||0;
    const meta = proximoNivel.visitas_minimas;
    const pct = Math.min(100, Math.round(((totalV-previo)/(meta-previo))*100));
    const faltan = Math.max(0, meta-totalV);
    progresoHtml = `<div class="progreso-wrap">
      <div class="progreso-label">${faltan>0?`Te faltan ${faltan} visita${faltan===1?'':'s'} para ${proximoNivel.nombre}`:'¡Ya alcanzaste este nivel!'}</div>
      <div class="progreso-bar"><div class="progreso-fill" style="width:${pct}%"></div></div>
    </div>`;
  } else if(niveles.length){
    progresoHtml = `<div class="progreso-wrap"><div class="progreso-label">Alcanzaste el nivel máximo 🎉</div></div>`;
  }

  // nivel_minimo_id: null = sin restricción (visible a todos). Si apunta
  // a un nivel que ya no existe (borrado), también se trata como sin
  // restricción — nunca rompe, nunca oculta una alianza por accidente.
  // nivel_sin_restriccion=true ("Todos", elegido a propósito) siempre
  // visible. nivel_minimo_id=null SIN ese flag significa que el nivel
  // asignado se borró — se oculta hasta que el dueño la reasigne, en
  // vez de mostrarla de más por error (más seguro para beneficios premium).
  const clienteOrden = nivelActual?.orden ?? 0;
  const alianzasVisibles = alianzas.filter(a=>{
    if(a.nivel_sin_restriccion) return true;
    if(!a.nivel_minimo_id) return false;
    const req = niveles.find(nv=>nv.id===a.nivel_minimo_id);
    if(!req) return false;
    return req.orden <= clienteOrden;
  });

  const alianzasHtml = alianzasVisibles.length
    ? alianzasVisibles.map(a=>`
      <div class="alianza-item">
        <div class="alianza-logo">${a.logo_url?`<img src="${a.logo_url}">`:'🤝'}</div>
        <div style="flex:1">
          <div class="alianza-nombre">${a.nombre}</div>
          <div class="alianza-beneficio">${a.beneficio}</div>
          ${a.descripcion?`<div class="alianza-desc">${a.descripcion}</div>`:''}
          ${a.link?`<a class="alianza-link" href="${a.link}" target="_blank" rel="noopener">Ver más →</a>`:''}
        </div>
      </div>`).join('')
    : '<div class="empty">Todavía no hay alianzas disponibles para tu nivel.</div>';

  const historialHtml = historial.length
    ? historial.map(h=>{
        // h.nivel es un snapshot de texto del momento en que se ganó —
        // puede no matchear ningún nivel_vip actual si se renombró o
        // borró después. Se muestra igual, con estilo neutro si no matchea.
        const hIdx = niveles.findIndex(nv=>nv.nombre===h.nivel);
        return `<div class="hist-item">
        <span><span class="badge ${badgePos(hIdx)}">${hIdx>=0?iconoPos(hIdx):'🏆'} ${h.nivel}</span></span>
        <span class="hist-fecha">${fmtFechaCorta(h.fecha_ganado)}</span>
      </div>`;
      }).join('')
    : '<div class="empty">Todavía no subiste de nivel — ¡sigue viniendo!</div>';

  document.getElementById('contenido').innerHTML = `
    <div class="card hero">
      <div class="hero-badge">${iconoPos(idx)}</div>
      <div class="hero-nombre">${cliente.nombre}</div>
      <div class="hero-nivel" style="color:${colorPos(idx)}">${nivel}</div>
      <div class="hero-beneficio">${beneficio}</div>
      ${progresoHtml}
    </div>
    <div class="card">
      <div class="card-title">🤝 Alianzas disponibles para vos</div>
      ${alianzasHtml}
    </div>
    <div class="card">
      <div class="card-title">🏆 Tu historial VIP</div>
      ${historialHtml}
    </div>
  `;
}

init();
</script>
</body>
</html>
